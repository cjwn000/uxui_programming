<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {
            list-style: none;
            border-top: 1px solid #ff0202;
            border-bottom: 1px solid #ff0000;
            padding: 10px 20px;
            text-align: center;
        }

        li {
            display: inline-block;
            margin: 0 15px;
            padding: 10px 0;
            letter-spacing: 15px;
            text-transform: uppercase;
        }

        ul li a {
            text-decoration: none;
            color: #000;
            font-size: 18px;
        }
        ul li a:hover {
            color: rgb(255, 0, 0);
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
            text-align: center;
        }
        th,td {
            border-bottom: 1px solid green;
            width: 100px;
        }
        th {
            background-color: green;
            color: white;
        }
        tr:nth-child(even){
            background-color: aqua;
        }
        tr:hover {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">About</a></li>
